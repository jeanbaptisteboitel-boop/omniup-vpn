# Serveur de coordination OmniUp VPN en une commande :
#   docker compose up -d
#   docker compose logs omni-server   # la clé admin s'affiche au premier démarrage
#
# En production : placez un reverse proxy TLS devant le port 8080, ou
# passez les certificats via OPTIONS (--tls-cert/--tls-key).
services:
  omni-server:
    build: .
    # ou : image: ghcr.io/jeanbaptisteboitel-boop/omniup-vpn:latest
    restart: unless-stopped
    ports:
      - "8080:8080/tcp"   # API de coordination
      - "3478:3478/udp"   # STUN (découverte d'endpoint)
      - "3479:3479/udp"   # relais de secours
    volumes:
      - omniup-state:/var/lib/omniup

volumes:
  omniup-state:
