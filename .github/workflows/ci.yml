name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Build
        run: make build
      - name: Tests
        run: go test ./...
      - name: Compilation croisée (macOS, Windows)
        run: |
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build ./cmd/omnid
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./cmd/omnid
